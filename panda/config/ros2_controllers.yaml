controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    panda_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    panda_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0
panda_arm_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.1
      goal_time: 0.5
    gains:
      panda_joint1: {p: 100, i: 0, d: 10, i_clamp: 1}
      panda_joint2: {p: 100, i: 0, d: 10, i_clamp: 1}
      panda_joint3: {p: 100, i: 0, d: 10, i_clamp: 1}
      panda_joint4: {p: 100, i: 0, d: 10, i_clamp: 1}
      panda_joint5: {p: 50, i: 0, d: 5, i_clamp: 1}
      panda_joint6: {p: 50, i: 0, d: 5, i_clamp: 1}
      panda_joint7: {p: 50, i: 0, d: 5, i_clamp: 1}
panda_gripper_controller:
  ros__parameters:
    # Both finger joints listed so OMPL plans for both and the
    # controller drives both. finger_joint2 must use signed convention:
    # axis=(0 -1 0), so open=-0.035 while finger_joint1 open=+0.035.
    joints:
      - panda_finger_joint1
      - panda_finger_joint2
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.1
      goal_time: 0.5
    gains:
      panda_finger_joint1: {p: 100, i: 0, d: 10, i_clamp: 1}
      panda_finger_joint2: {p: 100, i: 0, d: 10, i_clamp: 1}